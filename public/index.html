<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/table.css">
    <link rel="stylesheet" href="/css/mobile.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>

<body>

    <div class="container">

        <header class="header">
            <h1>Controle Financeiro</h1>
            <button id="open-modal" class="btn-primary">+ Nova Transação</button>
        </header>

        <div class="top-grid">

            <section class="card">
                <h3>🎯 Meta de Economia</h3>
                <input type="number" id="goal-input" placeholder="Meta (R$)">
                <button id="save-goal" class="btn-secondary">Salvar</button>
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <p id="goal-status"></p>
            </section>

            <section class="card balance-card">
                <p>Saldo Atual</p>
                <h2 id="saldo">R$ 0,00</h2>
            </section>

        </div>

        <div class="middle-grid">

            <section class="card">
                <h3>Resumo por Cartão</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Cartão</th>
                            <th>Total</th>
                            <th>Limite</th>
                        </tr>
                    </thead>
                    <tbody id="card-summary-list"></tbody>
                </table>
            </section>

            <section class="card">

                <div class="chart-header">
                    <h3>Resumo Financeiro</h3>
                    <div class="chart-controls">
                        <button id="toggle-chart-mode" class="chart-toggle-btn">
                            Modo: Cartão
                        </button>

                        <button id="toggle-chart-period" class="chart-toggle-btn">
                            Período: Tudo
                        </button>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>

            </section>

        </div>

        <section class="card">
            <h3>Histórico</h3>

            <div class="filters">

                <div class="filter-group">
                    <label>Tipo</label>
                    <select id="filter-type">
                        <option value="todos">Todos</option>
                        <option value="receita">Receita</option>
                        <option value="despesa">Despesa</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Cartão</label>
                    <select id="filter-card">
                        <option value="todos">Todos</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Período</label>
                    <select id="filter-period">
                        <option value="tudo">Tudo</option>
                        <option value="mes">Mês Atual</option>
                        <option value="ano">Ano Atual</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Ordenar</label>
                    <select id="filter-order">
                        <option value="desc">Maior → Menor</option>
                        <option value="asc">Menor → Maior</option>
                    </select>
                </div>

            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Tipo</th>
                            <th>Descrição</th>
                            <th>Origem</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-list">

                        <tr class="skeleton">
                            <td colspan="6" style="height:40px"></td>
                        </tr>

                        <tr class="skeleton">
                            <td colspan="6" style="height:40px"></td>
                        </tr>

                        <tr class="skeleton">
                            <td colspan="6" style="height:40px"></td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <!-- MODAL TRANSAÇÃO -->
    <div id="transaction-modal" class="modal-overlay">
        <div class="modal">

            <div class="modal-header">
                <h3>Nova Transação</h3>
                <button type="button" id="cancel-transaction" class="btn-secondary">Cancelar</button>
            </div>

            <form id="transaction-form" class="transaction-grid">

                <input id="transaction-date" type="date" required>

                <select id="transaction-type">
                    <option value="receita">Receita</option>
                    <option value="despesa">Despesa</option>
                </select>

                <input type="text" id="transaction-description" placeholder="Descrição" required>
                <select id="transaction-category">
                    <option value="">Categoria</option>
                </select>
                <input type="number" id="transaction-amount" placeholder="Valor" required>

                <div id="origin-group">
                    <label id="origin-label">Origem</label>
                    <select id="transaction-origin"></select>
                </div>
                <button type="submit" class="btn-primary">Salvar Transação</button>
            </form>

        </div>
    </div>

    <!-- MODAL LIMITE -->
    <div id="limit-modal" class="limit-modal">
        <div class="limit-modal-content">
            <h3>Definir Limite</h3>
            <p id="limit-card-name"></p>
            <input type="number" id="limit-input" placeholder="Limite">
            <button id="save-limit">Salvar</button>
            <button id="cancel-limit">Cancelar</button>
        </div>
    </div>

    <button id="fab-add">+</button>
    <script src="/script.js" defer></script>

</body>

</html>
